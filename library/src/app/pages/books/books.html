<div class="container text-center" style="margin-top: 56px;">
  <h2 class="fw-bold mb-4">
    {{ searchTerm ? 'Results for "' + searchTerm + '"' : 'Books Available' }}
  </h2>

  @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border text-warning" role="status"></div>
      <p class="mt-3 text-muted">Loading books...</p>
    </div>
  } @else if (error) {
    <p class="text-danger">Something went wrong fetching books. Please try again.</p>
  } @else {
    <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
      @for (book of books; track book.key) {
        <div class="col d-flex justify-content-center">
          <app-book-card [book]="book"></app-book-card>
        </div>
      } @empty {
        <p>There are no items.</p>
      }
    </div>
  }
</div>
