<div id="mainCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1600" class="d-block w-100 carousel-img" alt="Bookshelf">
      <div class="carousel-caption">
        <h2 class="fw-bold">🔥 Trending This Week</h2>
        <p>Discover Your Next Great Read</p>
        <a routerLink="/books" class="btn btn-warning px-4 py-2 mt-2">Browse Books</a>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1600" class="d-block w-100 carousel-img" alt="Open book">
      <div class="carousel-caption">
        <h2 class="fw-bold">Thousands of Titles</h2>
        <p>Every genre, every author, all in one place</p>
        <a routerLink="/books" class="btn btn-warning px-4 py-2 mt-2">Explore</a>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1600" class="d-block w-100 carousel-img" alt="Library">
      <div class="carousel-caption">
        <h2 class="fw-bold">Powered by Open Library</h2>
        <p>Free, open, and always growing</p>
        <a routerLink="/books" class="btn btn-warning px-4 py-2 mt-2">Start Reading</a>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
